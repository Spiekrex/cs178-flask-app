<!DOCTYPE html>
<html lang="en">
<head>
    <title>World Database Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="alert alert-{{ category }}">
    {{ message }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<div class="container">
    <h1 class="mt-5">World City Management</h1>

    <div class="mt-3">
        <a href="/add-city" class="btn btn-primary">Add City</a>
        <a href="/biggest-cities" class="btn btn-info">Display Biggest Cities</a>
        <a href="/display-countries" class="btn btn-secondary">Display Countries</a>
    </div>
</div>

</body>
</html>
